<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plantilla Burbuja</title>
<style>
body{margin:0;background:#0b1220;color:#eef2ff;font-family:Segoe UI,Arial,sans-serif}
header{background:linear-gradient(90deg,#7e4c9b,#cb55e9);padding:42px}
.container{max-width:1150px;margin:auto;padding:30px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.card{background:#172033;border-radius:16px;padding:22px;box-shadow:0 8px 20px rgba(0,0,0,.3)}
h1{margin:0;font-size:42px}
h2{color:#fdb5f3;border-bottom:1px solid #334155;padding-bottom:6px}
.badge{display:inline-block;background:#b467d3;padding:8px 14px;border-radius:20px;margin:5px}
table{width:100%;border-collapse:collapse}
td{padding:8px;border-bottom:1px solid #334155}
.footer{text-align:center;color:#94a3b8;padding:20px}
</style>
</head>
<body>

<!-- ==========================================================
EDITAR SOLAMENTE EL OBJETO "jugador"
La foto debe estar en la misma carpeta que este HTML.
=========================================================== -->

<script>
const jugador={
foto:"../imagenes/lux.png",
nombre:"AlmiranteAGOPIAN#UGVG",
rango:"Platino III",
roles:"ADC Principal • Support Secundario",
champions:["Caitlyn","Ashe","Jinx", "Smolder"],
perfil:"ADC con una excelente disposición para aprender. Destaca por su actitud positiva y por buscar mejorar constantemente.",
fortalezas:[
"Está más activa en la partida.",
"Tiene más iniciativa y confianza en sí misma.",
"Esta más pendiente a los objetivos."
],
mejorar:[
"Visualizar más el mapa.",
"Aprovechar oportunidades que pueden favorecerla.",
"Arriesgar para ganar."
],
evaluacion:{
    "Champion Pool":"⭐⭐⭐⭐☆",
    "Mecánicas":"⭐⭐⭐☆☆",
    "Macro":"⭐⭐⭐⭐☆",
    "Comunicación":"⭐⭐⭐⭐☆",
    "Confianza":"⭐⭐⭐☆☆",
    "Potencial":"⭐⭐⭐⭐⭐"
},
nota:"Layla es una jugadora con bastante comunicación y confianza en el equipo, precisa confiar más en ella y en sus decisiones para que las jugadas salgan a su favor. Aprovechar ventajas y estar pendiente del enemigo es su prioridad para lograr posicionarse bien y dar todo de ella. Sabe lo suficiente del juego para lograr comentar jugadas y tratar de que el equipo la siga."
};
</script>

<header id="header"></header>
<div class="container">
<div class="grid">
<div class="card">
<h2>Champion Pool</h2>
<div id="champions"></div>
<h2>Perfil</h2>
<p id="perfil"></p>
</div>

<div class="card">
<h2>Fortalezas</h2>
<ul id="fort"></ul>
<h2>Aspectos a mejorar</h2>
<ul id="mej"></ul>
</div>

<div class="card">
<h2>Evaluación</h2>
<table id="evaluacion"></table>
</div>

<div class="card">
<h2>Nota del Coach</h2>
<p id="nota"></p>
</div>
</div>
<div class="footer">Dashboard de Coaching • Plantilla Burbuja</div>
</div>

<script>
header.innerHTML=`
<img src="${jugador.foto}" style="width:96px;height:96px;object-fit:cover;border-radius:50%;float:right;border:3px solid white">
<h1>${jugador.nombre} • ${jugador.rango}</h1>
<p>${jugador.roles}</p>`;
jugador.champions.forEach(c=>champions.innerHTML+=`<span class="badge">${c} ⭐</span>`);
perfil.textContent=jugador.perfil;
jugador.fortalezas.forEach(x=>fort.innerHTML+=`<li>${x}</li>`);
jugador.mejorar.forEach(x=>mej.innerHTML+=`<li>${x}</li>`);
const tablaEvaluacion = document.getElementById("evaluacion");

for (const [k, v] of Object.entries(jugador.evaluacion)) {
    tablaEvaluacion.innerHTML += `
        <tr>
            <td>${k}</td>
            <td>${v}</td>
        </tr>`;
}

const nota = document.getElementById("nota");
nota.textContent = jugador.nota;
</script>

</body>
</html>


<table id="evaluacion"></table>
